name: ETL Refresh

on:
  schedule:
    # Hourly during US release windows: Mon-Fri 13:00-22:00 UTC
    - cron: '0 13-22 * * 1-5'
    # Daily fallback: 06:00 UTC
    - cron: '0 6 * * *'
  workflow_dispatch:  # manual trigger

jobs:
  refresh:
    runs-on: ubuntu-latest

    permissions:
      contents: write  # needed to commit updated JSON files

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Install Python dependencies
        working-directory: etl
        run: uv sync

      - name: Run ETL
        working-directory: etl
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: uv run python -m src.main

      - name: Commit updated data files
        run: |
          git config user.name "smol economist [bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "chore: ETL refresh $(date -u '+%Y-%m-%dT%H:%M:%SZ')"
          git push
