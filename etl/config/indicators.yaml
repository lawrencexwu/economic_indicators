# Indicator metadata
# Source: equity_indicators.md + dashboard_design.md (Baumohl 3rd ed.)
#
# tier:   1 = Baumohl top-10 most stock-sensitive (weight 3)
#         2 = Baumohl leading indicators (weight 2)
#         3 = Other influential (weight 1)
# source_type: fred | scraper
# history_years: 30 for recession indicators, 10 for others

indicators:

  # ═══════════════════════════════════════════════════════════════════
  # PAGE 1 — REGIME / RECESSION RISK
  # ═══════════════════════════════════════════════════════════════════

  - id: yield_curve_10y3m
    name: "Yield Curve (10Y minus 3M)"
    fred_ticker: "T10Y3M"
    category: "rates"
    page: "regime"
    tier: 2
    weight: 2
    frequency: "daily"
    release_pattern: "daily"
    source_type: "fred"
    history_years: 30
    unit: "percent"
    metadata:
      what_it_measures: >
        Spread between 10-year and 3-month Treasury yields.
        The NY Fed's preferred recession predictor. Inversion (negative spread)
        has preceded every US recession since 1969 with no false positives.
      why_it_matters: >
        Inversion reflects bond market expecting Fed cuts ahead, typically because
        growth is slowing. Lead time from inversion to recession: 6-24 months
        (median ~14). Equity peaks typically come 6-12 months after first inversion.
      scoring_rule: >
        > +200bp → +70 | +100 to +200 → +40 | +50 to +100 → +10 | 0 to +50 → -20
        | -50 to 0 → -50 | -100 to -50 → -80 | < -100bp → -100
        Special: if curve was inverted >6mo and now re-steepening to >0, score = -50
        (re-steepening from inversion is a near-recession signal, not bullish).

  - id: yield_curve_10y2y
    name: "Yield Curve (10Y minus 2Y)"
    fred_ticker: "T10Y2Y"
    category: "rates"
    page: "regime"
    tier: 2
    weight: 2
    frequency: "daily"
    release_pattern: "daily"
    source_type: "fred"
    history_years: 30
    unit: "percent"
    metadata:
      what_it_measures: >
        Spread between 10-year and 2-year Treasury yields. Widely watched by
        markets as the primary yield curve signal.
      why_it_matters: >
        Tracks Fed rate expectations over the medium term. Often inverts before
        10Y-3M and is more sensitive to forward rate expectations.
      scoring_rule: "Same bands as 10Y-3M. Phase 3."

  - id: claims_4wma
    name: "Initial Claims (4-week MA)"
    fred_ticker: "IC4WSA"
    category: "labor"
    page: "regime"
    tier: 1
    weight: 3
    frequency: "weekly"
    release_pattern: "weekly_thursday"
    source_type: "fred"
    history_years: 30
    unit: "thousands"
    metadata:
      what_it_measures: >
        Four-week moving average of first-time unemployment insurance filings.
        DOL. Weekly, Thursday 8:30 ET. Smooths weekly noise in raw claims.
      why_it_matters: >
        High-frequency labor market read. Rising claims = layoffs accelerating.
        The 4-week MA is the most useful version; raw claims are too volatile.
        Claims >350k historically associated with recession conditions.
      scoring_rule: >
        z = (current 4wMA - trailing 3y mean) / trailing 3y stddev
        momentum = (current 4wMA - 4wMA 8 weeks ago) / 4wMA 8 weeks ago
        raw_score = -50*z - 100*momentum (high & rising = bearish)
        clamp to [-100, +100]

  - id: initial_claims
    name: "Initial Jobless Claims (weekly)"
    fred_ticker: "ICSA"
    category: "labor"
    page: "pulse"
    tier: 1
    weight: 3
    frequency: "weekly"
    release_pattern: "weekly_thursday"
    source_type: "fred"
    history_years: 10
    unit: "thousands"
    metadata:
      what_it_measures: >
        Raw weekly initial unemployment insurance filings. DOL. Thursday 8:30 ET.
      why_it_matters: >
        Most timely labor market release. Volatile week-to-week; use 4wMA for
        trend. Breakout above 300-350k is a recession warning sign.
      scoring_rule: "Use 4wMA series (IC4WSA) for primary score. Phase 3."

  - id: continuing_claims
    name: "Continuing Claims"
    fred_ticker: "CCSA"
    category: "labor"
    page: "pulse"
    tier: 3
    weight: 1
    frequency: "weekly"
    release_pattern: "weekly_thursday"
    source_type: "fred"
    history_years: 10
    unit: "thousands"
    metadata:
      what_it_measures: >
        Number of people currently receiving unemployment benefits (insured
        unemployment). Released with a 1-week lag vs initial claims.
      why_it_matters: >
        Measures job-finding difficulty. Rising continuing claims while initial
        claims stabilize = hard to find work once laid off.
      scoring_rule: "Z-score with momentum, similar to IC4WSA. Phase 3."

  - id: lei
    name: "Conference Board Leading Economic Index (LEI)"
    fred_ticker: null
    category: "activity"
    page: "regime"
    tier: 3
    weight: 1
    frequency: "monthly"
    release_pattern: "monthly_3rd_thursday"
    source_type: "scraper"
    scraper: "conference_board"
    history_years: 10
    data_note: "Conference Board pulled free FRED access ~2020. Requires CB subscription or scraping."
    unit: "index"
    metadata:
      what_it_measures: >
        Composite of 10 leading indicators from Conference Board. Monthly,
        3rd Thursday. Components: ISM new orders, building permits, claims,
        yield curve, stock prices, consumer expectations, among others.
      why_it_matters: >
        Six consecutive monthly declines in LEI (or LEI YoY below -4%) has
        historically signaled recession. Captures broad leading information in
        one number.
      scoring_rule: >
        Score based on YoY % change: > +3% → +60 | 0 to +3% → +20
        | -2% to 0% → -20 | -4% to -2% → -50 | < -4% → -80. Phase 3.

  - id: cfnai_ma3
    name: "CFNAI 3-Month Moving Average"
    fred_ticker: "CFNAIMA3"
    category: "activity"
    page: "regime"
    tier: 3
    weight: 1
    frequency: "monthly"
    release_pattern: "monthly_last_monday"
    source_type: "fred"
    history_years: 30
    unit: "index"
    metadata:
      what_it_measures: >
        Chicago Fed National Activity Index 3-month moving average. Composite
        of 85 indicators. Designed so 0 = historical average growth, negative =
        below-average growth.
      why_it_matters: >
        Value below -0.7 historically = recession risk rising. Below -1.5 =
        recession likely underway. Above +0.7 = above-trend growth, watch for
        inflation. Baumohl considers this the broadest single activity gauge.
      scoring_rule: >
        > +1.0 → -30 (overheating, late-cycle warning)
        +0.7 to +1.0 → 0 (inflation acceleration risk)
        +0.2 to +0.7 → +60 (healthy expansion)
        -0.7 to +0.2 → +20 (neutral/slowing)
        -1.5 to -0.7 → -60 (recession risk rising)
        < -1.5 → -100 (recession underway)

  - id: cfnai
    name: "CFNAI (monthly)"
    fred_ticker: "CFNAI"
    category: "activity"
    page: "regime"
    tier: 3
    weight: 1
    frequency: "monthly"
    release_pattern: "monthly_last_monday"
    source_type: "fred"
    history_years: 10
    unit: "index"
    metadata:
      what_it_measures: >
        Chicago Fed National Activity Index, single-month reading. More volatile
        than the 3-month MA; the MA3 is the primary signal.
      why_it_matters: "Underlying data for CFNAI-MA3."
      scoring_rule: "Use CFNAI-MA3 for primary scoring. Phase 3."

  - id: sahm_rule
    name: "Sahm Rule Recession Indicator"
    fred_ticker: "SAHMREALTIME"
    category: "labor"
    page: "regime"
    tier: 3
    weight: 1
    frequency: "monthly"
    release_pattern: "monthly_first_friday"
    source_type: "fred"
    history_years: 30
    unit: "percent"
    metadata:
      what_it_measures: >
        Difference between the 3-month moving average of the national unemployment
        rate and its 12-month low. Developed by Claudia Sahm at the Fed.
      why_it_matters: >
        Threshold of 0.50 percentage points has triggered at the start of every
        US recession since 1970 with no false positives. Real-time recession
        indicator — no revisions or lags.
      scoring_rule: >
        < 0.20 → +40 | 0.20 to 0.35 → 0 | 0.35 to 0.50 → -40
        | 0.50 to 0.75 → -70 | > 0.75 → -100. Phase 3.

  - id: nahb_index
    name: "NAHB Housing Market Index (composite)"
    fred_ticker: null
    category: "housing"
    page: "regime"
    tier: 2
    weight: 2
    frequency: "monthly"
    release_pattern: "monthly_3rd_wednesday"
    source_type: "scraper"
    scraper: "nahb"
    history_years: 10
    unit: "index"
    metadata:
      what_it_measures: >
        National Association of Home Builders / Wells Fargo Housing Market Index.
        Diffusion index: >50 = more builders view conditions as good than poor.
      why_it_matters: >
        Leads housing starts and permits. One of Baumohl's top leading indicators.
        NAHB Traffic subindex (prospective buyer traffic) is the most
        forward-looking component.
      scoring_rule: >
        > 60 → +60 | 50-60 → +30 | 40-50 → 0 | 30-40 → -30
        | 20-30 → -60 | < 20 → -90. Phase 3.

  - id: ny_fed_recession_prob
    name: "Smoothed US Recession Probability"
    fred_ticker: "RECPROUSM156N"
    category: "rates"
    page: "regime"
    tier: 3
    weight: 1
    frequency: "monthly"
    release_pattern: "monthly_variable"
    source_type: "fred"
    history_years: 30
    unit: "percent"
    metadata:
      what_it_measures: >
        Smoothed U.S. Recession Probabilities from Piger-Chauvet dynamic factor
        model. Values are probabilities (0-100) of being in a recession.
      why_it_matters: >
        Statistical recession probability that combines multiple economic signals
        into a single probability estimate. Above 30% has historically been a
        strong recession warning.
      scoring_rule: >
        < 5% → +30 | 5-15% → 0 | 15-30% → -30 | 30-50% → -60
        | > 50% → -90. Phase 3.

  - id: unemp_longterm
    name: "Unemployed 15+ Weeks"
    fred_ticker: "UEMP15OV"
    category: "labor"
    page: "regime"
    tier: 3
    weight: 1
    frequency: "monthly"
    release_pattern: "monthly_first_friday"
    source_type: "fred"
    history_years: 10
    unit: "thousands"
    metadata:
      what_it_measures: >
        Number of persons unemployed 15 weeks and over. Measures structural
        vs. frictional unemployment.
      why_it_matters: >
        Rising long-term unemployment signals labor market deterioration beyond
        temporary layoffs. Lags the cycle but confirms trend.
      scoring_rule: "Z-score vs 3-year trailing. Phase 3."

  # ═══════════════════════════════════════════════════════════════════
  # PAGE 2 — FED REACTION FUNCTION
  # ═══════════════════════════════════════════════════════════════════

  - id: cpi_core
    name: "Core CPI YoY"
    fred_ticker: "CPILFESL"
    category: "inflation"
    page: "fed"
    tier: 1
    weight: 3
    frequency: "monthly"
    release_pattern: "monthly_mid"
    source_type: "fred"
    history_years: 10
    unit: "index"
    metadata:
      what_it_measures: >
        Consumer Price Index for All Urban Consumers: All Items Less Food and
        Energy. BLS. Monthly, mid-month 8:30 ET. Core excludes volatile F&E.
      why_it_matters: >
        Hot CPI = rate fear = equity drawdown (esp. duration/multiple-sensitive
        names). Core CPI is the Fed's benchmark for underlying inflation; it
        determines the pace of rate hikes/cuts.
      scoring_rule: >
        Score as YoY % change vs 2% target:
        < 2.0% → +60 | 2.0-2.5% → +20 | 2.5-3.0% → -20
        | 3.0-4.0% → -50 | > 4.0% → -80. Phase 3.

  - id: cpi_headline
    name: "CPI Headline YoY"
    fred_ticker: "CPIAUCSL"
    category: "inflation"
    page: "fed"
    tier: 1
    weight: 3
    frequency: "monthly"
    release_pattern: "monthly_mid"
    source_type: "fred"
    history_years: 10
    unit: "index"
    metadata:
      what_it_measures: >
        Consumer Price Index for All Urban Consumers: All Items. BLS. Monthly.
        Includes food and energy.
      why_it_matters: >
        Headline CPI drives real-income expectations and consumer sentiment.
        Relevant for sectors like airlines and homebuilders where energy costs matter.
      scoring_rule: "Same bands as core CPI. Phase 3."

  - id: core_pce
    name: "Core PCE Deflator YoY"
    fred_ticker: "PCEPILFE"
    category: "inflation"
    page: "fed"
    tier: 1
    weight: 3
    frequency: "monthly"
    release_pattern: "monthly_end"
    source_type: "fred"
    history_years: 10
    unit: "index"
    metadata:
      what_it_measures: >
        Personal Consumption Expenditures Price Index excluding Food and Energy.
        BEA. Monthly, end-of-month 8:30 ET. The Fed's preferred inflation gauge.
      why_it_matters: >
        Core PCE drives Fed reaction function. The 2% target is specifically
        for PCE, not CPI. Differences from CPI: PCE uses chain-weighting and
        covers broader spending (not just out-of-pocket).
      scoring_rule: >
        < 2.0% → +60 | 2.0-2.3% → +30 | 2.3-2.5% → 0
        | 2.5-3.0% → -30 | 3.0-3.5% → -60 | > 3.5% → -90. Phase 3.

  - id: pce_deflator
    name: "PCE Deflator"
    fred_ticker: "PCEPI"
    category: "inflation"
    page: "fed"
    tier: 1
    weight: 3
    frequency: "monthly"
    release_pattern: "monthly_end"
    source_type: "fred"
    history_years: 10
    unit: "index"
    metadata:
      what_it_measures: "Headline PCE price index, including food and energy."
      why_it_matters: "Context for core PCE; energy-driven spikes can affect inflation expectations."
      scoring_rule: "Same bands as core PCE. Phase 3."

  - id: ppi_final_demand
    name: "PPI Final Demand"
    fred_ticker: "PPIFIS"
    category: "inflation"
    page: "fed"
    tier: 1
    weight: 3
    frequency: "monthly"
    release_pattern: "monthly_mid"
    source_type: "fred"
    history_years: 10
    unit: "index"
    metadata:
      what_it_measures: >
        Producer Price Index for Final Demand. BLS. Monthly, day before or after
        CPI. Measures wholesale/input inflation. Final demand goods most relevant.
      why_it_matters: >
        Pipeline pressure on margins. PPI leads CPI by ~3-6 months. Rising PPI
        compresses margins before CPI catches up. Relevant for industrials/semis.
      scoring_rule: "YoY change vs historical average. Phase 3."

  - id: ppi_crude_ex_food_energy
    name: "PPI Crude Goods ex-Food & Energy"
    fred_ticker: "WPSID6112"
    category: "inflation"
    page: "fed"
    tier: 2
    weight: 2
    frequency: "monthly"
    release_pattern: "monthly_mid"
    source_type: "fred"
    history_years: 10
    unit: "index"
    metadata:
      what_it_measures: >
        Far-upstream price pressure: crude goods excluding food and energy.
        Early-stage pipeline inflation indicator.
      why_it_matters: >
        Baumohl's Tier 2 leading indicator. Spikes here precede PPI Final Demand
        moves by 3-6 months, which then lead CPI.
      scoring_rule: "YoY change threshold. Phase 3."

  - id: eci
    name: "Employment Cost Index"
    fred_ticker: "ECIWAG"
    category: "labor"
    page: "fed"
    tier: 3
    weight: 1
    frequency: "quarterly"
    release_pattern: "quarterly_end_month"
    source_type: "fred"
    history_years: 10
    unit: "index"
    metadata:
      what_it_measures: >
        Quarterly measure of total compensation costs for civilian workers.
        Fed's preferred wage gauge. Released end of January, April, July, October.
      why_it_matters: >
        Wages are the biggest input cost for services inflation. The Fed watches
        ECI closely — if wage growth stays above ~3.5% annualized, services
        inflation is hard to bring to 2%.
      scoring_rule: >
        Annualized: < 3.0% → +60 | 3.0-3.5% → +20 | 3.5-4.0% → -20
        | 4.0-5.0% → -50 | > 5.0% → -80. Phase 3.

  - id: breakeven_5y
    name: "5-Year Breakeven Inflation"
    fred_ticker: "T5YIE"
    category: "rates"
    page: "fed"
    tier: 3
    weight: 1
    frequency: "daily"
    release_pattern: "daily"
    source_type: "fred"
    history_years: 10
    unit: "percent"
    metadata:
      what_it_measures: >
        Market-implied 5-year inflation expectations derived from TIPS spread.
        Measures what bond traders expect CPI to average over the next 5 years.
      why_it_matters: >
        Anchored expectations (<2.5%) suggest inflation is temporary and Fed can
        be patient. Unanchored expectations (>3%) signal persistent inflation
        and aggressive Fed response ahead.
      scoring_rule: >
        < 2.0% → +40 | 2.0-2.5% → +20 | 2.5-3.0% → -20
        | 3.0-3.5% → -50 | > 3.5% → -80. Phase 3.

  - id: unemployment_rate
    name: "Unemployment Rate (U-3)"
    fred_ticker: "UNRATE"
    category: "labor"
    page: "fed"
    tier: 1
    weight: 3
    frequency: "monthly"
    release_pattern: "monthly_first_friday"
    source_type: "fred"
    history_years: 10
    unit: "percent"
    metadata:
      what_it_measures: >
        Bureau of Labor Statistics U-3 unemployment rate. Monthly, 1st Friday
        8:30 ET. Standard definition: persons without jobs who actively sought
        work in past 4 weeks.
      why_it_matters: >
        Strong NFP bullish for equities except when economy at capacity (then
        rate-fear dominates). Unemployment below NAIRU (~4%) = Fed pressure.
        Rising unemployment = growth concern but also potential for Fed cuts.
      scoring_rule: >
        Score depends on direction vs Fed mandate. Rising + above 4.5% = bullish
        (cuts coming). Rising from low = early warning. Phase 3.

  - id: unemployment_u6
    name: "Unemployment Rate (U-6 Underemployment)"
    fred_ticker: "U6RATE"
    category: "labor"
    page: "fed"
    tier: 3
    weight: 1
    frequency: "monthly"
    release_pattern: "monthly_first_friday"
    source_type: "fred"
    history_years: 10
    unit: "percent"
    metadata:
      what_it_measures: >
        Broadest measure of labor underutilization: includes part-time for
        economic reasons and marginally attached workers.
      why_it_matters: >
        Slack measure. High U-6 relative to U-3 signals underemployment.
        Wide U-6 vs U-3 spread = more slack than headline suggests.
      scoring_rule: "Phase 3."

  - id: labor_force_participation
    name: "Labor Force Participation Rate"
    fred_ticker: "CIVPART"
    category: "labor"
    page: "fed"
    tier: 3
    weight: 1
    frequency: "monthly"
    release_pattern: "monthly_first_friday"
    source_type: "fred"
    history_years: 10
    unit: "percent"
    metadata:
      what_it_measures: >
        Share of civilian noninstitutional population that is employed or
        actively seeking work.
      why_it_matters: >
        Low participation with low unemployment = tighter labor market than
        headline suggests. Structural shifts (aging, post-COVID) complicate
        the Fed's read on slack.
      scoring_rule: "Phase 3."

  - id: avg_hourly_earnings
    name: "Average Hourly Earnings YoY"
    fred_ticker: "AHETPI"
    category: "labor"
    page: "fed"
    tier: 1
    weight: 3
    frequency: "monthly"
    release_pattern: "monthly_first_friday"
    source_type: "fred"
    history_years: 10
    unit: "dollars"
    metadata:
      what_it_measures: >
        Average hourly earnings for all private employees. BLS, released with
        NFP on 1st Friday. AHE YoY is the key wage inflation number.
      why_it_matters: >
        Wages drive services inflation. AHE above 3.5% YoY makes the Fed's
        2% inflation target difficult. Baumohl Tier 1 component of NFP report.
      scoring_rule: >
        YoY: < 3.0% → +60 | 3.0-3.5% → +20 | 3.5-4.0% → -20
        | 4.0-5.0% → -50 | > 5.0% → -80. Phase 3.

  - id: fed_funds_rate
    name: "Effective Federal Funds Rate"
    fred_ticker: "DFF"
    category: "rates"
    page: "fed"
    tier: 3
    weight: 1
    frequency: "daily"
    release_pattern: "daily"
    source_type: "fred"
    history_years: 10
    unit: "percent"
    metadata:
      what_it_measures: "Effective overnight federal funds rate. Reflects actual FOMC policy stance."
      why_it_matters: >
        Level of rates vs neutral determines whether Fed is restrictive or
        accommodative. Real Fed Funds = DFF minus trailing 12mo CPI.
      scoring_rule: "Computed as spread vs neutral rate (r*). Phase 3."

  # ═══════════════════════════════════════════════════════════════════
  # PAGE 3 — GROWTH PULSE (HIGH-FREQUENCY)
  # ═══════════════════════════════════════════════════════════════════

  - id: empire_state_mfg
    name: "Empire State Manufacturing Index"
    fred_ticker: "GACDISA066MSFRBNY"
    category: "activity"
    page: "pulse"
    tier: 3
    weight: 1
    frequency: "monthly"
    release_pattern: "monthly_15th"
    source_type: "fred"
    history_years: 10
    unit: "index"
    metadata:
      what_it_measures: >
        NY Fed survey of manufacturing conditions. Diffusion index: >0 = expansion.
        Monthly, ~15th at 8:30 ET. Leads ISM by one week.
      why_it_matters: >
        Regional Fed surveys are ISM nowcasts. Released before ISM, so markets
        use them to forecast the national ISM print. Empire is the first out.
      scoring_rule: "Phase 3."

