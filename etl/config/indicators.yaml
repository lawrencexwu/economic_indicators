  - id: kc_fed_mfg
    name: "Kansas City Fed Manufacturing Index"
    fred_ticker: null
    category: "activity"
    page: "pulse"
    tier: 3
    weight: 1
    frequency: "monthly"
    release_pattern: "monthly_last_thursday"
    source_type: "scraper"
    scraper: "kc_fed"
    history_years: 10
    unit: "index"
    metadata:
      what_it_measures: "KC Fed 10th District manufacturing composite index."
      why_it_matters: "Part of 5-Fed composite ISM nowcast. Not on FRED free tier — scraped from kansascityfed.org."
      scoring_rule: "Phase 3."

  - id: dallas_fed_mfg
    name: "Dallas Fed Manufacturing Index"
    fred_ticker: null
    category: "activity"
    page: "pulse"
    tier: 3
    weight: 1
    frequency: "monthly"
    release_pattern: "monthly_last_monday"
    source_type: "scraper"
    scraper: "dallas_fed"
    history_years: 10
    unit: "index"
    metadata:
      what_it_measures: "Dallas Fed 11th District manufacturing composite (General Business Activity index)."
      why_it_matters: "Part of 5-Fed composite ISM nowcast. Released last Monday of month — often the last regional Fed report before ISM."
      scoring_rule: "Z-score vs trailing 36 months, higher is good."

  - id: ci_loans
