  # ─── JOLTS ────────────────────────────────────────────────────────

  - id: jolts_openings
    name: "JOLTS: Job Openings"
    fred_ticker: "JTSJOL"
    category: "labor"
    page: "cycle"
    tier: 3
    weight: 1
    frequency: "monthly"
    release_pattern: "monthly_variable"
    source_type: "fred"
    history_years: 10
    unit: "thousands"
    metadata:
      what_it_measures: "BLS Job Openings and Labor Turnover Survey: job openings. Monthly, ~1 month lag."
      why_it_matters: "Openings / unemployed ratio = tightness gauge. Openings falling = demand cooling."
      scoring_rule: "Phase 3."

  - id: jolts_quits_rate
    name: "JOLTS: Quits Rate"
    fred_ticker: "JTSQUR"
    category: "labor"
    page: "cycle"
    tier: 3
    weight: 1
    frequency: "monthly"
    release_pattern: "monthly_variable"
    source_type: "fred"
    history_years: 10
    unit: "percent"
    metadata:
      what_it_measures: "Quits rate from JOLTS. Workers voluntarily leaving jobs (%)."
      why_it_matters: >
        Best labor market tightness gauge. Workers only quit when they're
        confident they'll find a better job. Quits rate >3% = very tight.
        Falling quits rate = workers getting cautious.
      scoring_rule: "> 3.0% → +20 | 2.5-3.0% → 0 | 2.0-2.5% → -20 | < 2.0% → -50. Phase 3."

