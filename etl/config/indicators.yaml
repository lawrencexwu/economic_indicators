  # ─── GDP ──────────────────────────────────────────────────────────

  - id: gdp_real
    name: "Real GDP (Advance Estimate)"
    fred_ticker: "GDPC1"
    category: "activity"
    page: "cycle"
    tier: 1
    weight: 3
    frequency: "quarterly"
    release_pattern: "quarterly_advance"
    source_type: "fred"
    history_years: 10
    unit: "billions"
    metadata:
      what_it_measures: >
        Real Gross Domestic Product. BEA. Quarterly: Advance (~4 weeks after
        quarter-end), Second (2 months), Third (3 months).
      why_it_matters: >
        Baumohl #10. Mostly priced in by release, but composition
        (consumer vs. capex vs. inventory) drives sector rotation.
        Negative real GDP for 2 quarters = technical recession.
      scoring_rule: "Annualized growth rate: > 3% → +50 | 2-3% → +20 | 1-2% → 0 | 0-1% → -30 | <0% → -80. Phase 3."

