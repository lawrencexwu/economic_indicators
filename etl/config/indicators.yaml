        BEA personal consumption expenditures. Monthly, end-of-month 8:30 ET.
        Broadest measure of consumer spending (goods + services).
      why_it_matters: >
        Baumohl #8. Real spending is the GDP backbone. Consumer is 70% of GDP.
        Real PCE growth <1% annualized = recession territory.
      scoring_rule: "Real YoY growth rate. Phase 3."

