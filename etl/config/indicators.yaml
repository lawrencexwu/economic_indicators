    metadata:
      what_it_measures: >
        Philadelphia Fed manufacturing survey general business conditions. Monthly
        3rd Thursday 8:30 ET. Diffusion index: >0 = expansion.
      why_it_matters: "High correlation with ISM Mfg. Used in 5-Fed composite to nowcast ISM."
